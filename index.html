<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Createx Online Courses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
        }
    </style>
</head>
<body class="bg-[#FEDCD2] text-[#1E212C]">

    <header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 flex items-center justify-between">
        <div class="flex items-center space-x-16">
            <div class="font-black text-2xl tracking-wider">
                CREATE<span class="text-[#FF4C22]">X</span>
            </div>
            <nav class="hidden md:flex space-x-10 text-base font-bold text-[#424551]">
                <a href="#" class="hover:text-[#FF4C22] duration-500 transition">About Us</a>
                <a href="#" class="hover:text-[#FF4C22] duration-500 transition">Courses</a>
                <a href="#" class="hover:text-[#FF4C22] duration-500 transition">Events</a>
                <a href="#" class="hover:text-[#FF4C22] duration-500 transition">Blog</a>
                <a href="#" class="hover:text-[#FF4C22] duration-500 transition">Contacts</a>
            </nav>
        </div>
        
        <div class="flex items-center space-x-8">
            <button class="bg-[#FF4C22] hover:bg-[#e03d15] text-white font-bold px-7 py-3 rounded text-sm duration-500 transition">
                Get consultation
            </button>
            <a href="#" class="hidden sm:flex items-center space-x-2 font-bold text-sm text-[#424551] hover:text-[#FF4C22] duration-500 transition">
                
                <span>Log in / Register</span>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-12 pb-24">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            
            <div class="space-y-8">
                <div class="flex items-center space-x-4 cursor-pointer group">
                    
                    <span class="font-bold text-sm text-[#1E212C]">Play showreel</span>
                </div>

                <h1 class="text-4xl sm:text-5xl lg:text-6xl font-black text-[#1E212C] leading-tight max-w-xl">
                    Enjoy studying with Createx Online Courses
                </h1>

                <div class="flex flex-wrap gap-4 pt-4">
                    <button class="border border-[#FF4C22] text-[#FF4C22] hover:bg-[#FF4C22] hover:text-white font-bold px-10 py-4 rounded duration-500 transition">
                        About us
                    </button>
                    <button class="bg-[#FF4C22] hover:bg-[#e03d15] text-white font-bold px-10 py-4 rounded duration-500 transition">
                        Explore courses
                    </button>
                </div>
            </div>

            <div class="flex justify-center lg:justify-end">
                <img src="./illustration.png" alt="Createx Illustration" class="w-full max-w-lg object-contain object-right">
            </div>

        </div>
    </main>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
        <div class="flex flex-wrap items-center justify-between gap-y-6 text-[#1E212C]">
            
            <div class="flex items-center space-x-3">
                <span class="text-4xl font-black">1200</span>
                <span class="text-sm text-[#424551]">Students graduated</span>
            </div>
        

            <div class="flex items-center space-x-3">
                <span class="text-4xl font-black">84</span>
                <span class="text-sm text-[#424551]">Completed courses</span>
            </div>

            <div class="flex items-center space-x-3">
                <span class="text-4xl font-black">16</span>
                <span class="text-sm text-[#424551]">Qualified tutors</span>
            </div>

            <div class="flex items-center space-x-3">
                <span class="text-4xl font-black">5</span>
                <span class="text-sm text-[#424551]">Years of experience</span>
            </div>

        </div>
    </section>

    

</body>
</html>
